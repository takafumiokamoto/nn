[general]
live_config_reload = true
# Machine-local shell config (NOT synced — see shell.*.toml templates).
# Copy the right template to shell.local.toml on each machine.
import = ["~/.config/alacritty/shell.local.toml"]

# Colors (Doom One)
[colors.primary]
background = '#282c34'
foreground = '#bbc2cf'
# Normal colors
[colors.normal]
black   = '#282c34'
red     = '#ff6c6b'
green   = '#98be65'
yellow  = '#ecbe7b'
blue    = '#51afef'
magenta = '#c678dd'
cyan    = '#46d9ff'
white   = '#bbc2cf'

[window]
title = "Alacritty"
dynamic_title = false
padding = {x = 7, y = 0}
decorations = "None"
startup_mode = "Maximized"

[font]
size = 12

[font.normal]
family = "CaskaydiaMono Nerd Font"
style = "Italic"

[font.italic]
family = "CaskaydiaMono Nerd Font"

[font.bold]
family = "CaskaydiaMono Nerd Font"
style = "Italic"

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "v", mods = "Control", action = "Paste" },
  { key = "y", mode = "Vi", action = "Copy" },
  { key = "y", mode = "Vi", action = "ToggleViMode" },
  { key = "PageDown", action = "ScrollPageDown" },
  { key = "PageUp", action = "ScrollPageUp" },
  { key = "Enter", mods = "Shift", chars = "\n" }
]

[mouse]
bindings = [
  { mouse = "Right", action = "Paste" },
]
